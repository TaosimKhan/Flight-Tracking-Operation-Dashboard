<div class="kpi-grid" *ngIf="kpis$ | async as kpis">
  <article class="kpi-card kpi-card--total" aria-label="Total flights">
    <div class="kpi-card__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
      </svg>
    </div>
    <div class="kpi-card__content">
      <span class="kpi-card__label">Total Flights</span>
      <span class="kpi-card__value">{{ kpis.total }}</span>
    </div>
  </article>

  <article class="kpi-card kpi-card--active" aria-label="Active flights">
    <div class="kpi-card__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <div class="kpi-card__content">
      <span class="kpi-card__label">Active Flights</span>
      <span class="kpi-card__value">{{ kpis.active }}</span>
    </div>
  </article>

  <article class="kpi-card kpi-card--delayed" aria-label="Delayed flights">
    <div class="kpi-card__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <div class="kpi-card__content">
      <span class="kpi-card__label">Delayed Flights</span>
      <span class="kpi-card__value">{{ kpis.delayed }}</span>
    </div>
  </article>

  <article class="kpi-card kpi-card--arrived" aria-label="Arrived flights">
    <div class="kpi-card__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <div class="kpi-card__content">
      <span class="kpi-card__label">Arrived Flights</span>
      <span class="kpi-card__value">{{ kpis.arrived }}</span>
    </div>
  </article>
</div>
